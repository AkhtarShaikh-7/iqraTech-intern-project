<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Task Scheduler</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="top-bar">

            <a href="../../index.html"
               class="back-btn">
                ← Dashboard
            </a>

            <span>
                Internship Project #4
            </span>

        </div>

        <h1>Task Scheduler</h1>

        <form id="taskForm">

            <input
                type="text"
                id="taskName"
                placeholder="Enter Task Name"
                required>

            <input
                type="date"
                id="dueDate"
                required>

            <select id="priority" required>

                <option value="">
                    Select Priority
                </option>

                <option value="High">
                    High
                </option>

                <option value="Medium">
                    Medium
                </option>

                <option value="Low">
                    Low
                </option>

            </select>

            <button type="submit">
                Add Task
            </button>

        </form>

        <div id="taskList">

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
