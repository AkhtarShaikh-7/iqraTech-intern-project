<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Product Sort & Filter</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="top-bar">

        <a href="../../index.html"
           class="back-btn">

           ← Dashboard

        </a>

        <span>
            Internship Project #5
        </span>

    </div>

    <h1>Product Management Table</h1>

    <div class="filters">

        <input
            type="text"
            id="searchInput"
            placeholder="Search Product Name">

        <select id="categoryFilter">

            <option value="all">
                All Categories
            </option>

            <option value="Electronics">
                Electronics
            </option>

            <option value="Clothing">
                Clothing
            </option>

            <option value="Books">
                Books
            </option>

        </select>

    </div>

    <div class="table-container">

        <table>

            <thead>

                <tr>

                    <th onclick="sortTable('name')">
                        Product Name ↕
                    </th>

                    <th onclick="sortTable('price')">
                        Price ↕
                    </th>

                    <th onclick="sortTable('category')">
                        Category ↕
                    </th>

                </tr>

            </thead>

            <tbody id="tableBody">

            </tbody>

        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
