<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Registration Form Validation</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="top-bar">

<a href="../../index.html"
class="back-btn">

← Dashboard

</a>

<span>
Internship Project #9
</span>

</div>

<h1>Registration Form</h1>

<form id="registrationForm">

<div class="form-group">

<input
type="text"
id="fullName"
placeholder="Full Name">

<small class="error"
id="nameError"></small>

</div>

<div class="form-group">

<input
type="password"
id="password"
placeholder="Password">

<small class="error"
id="passwordError"></small>

</div>

<div class="form-group">

<input
type="text"
id="phone"
placeholder="Phone Number">

<small class="error"
id="phoneError"></small>

</div>

<div class="form-group">

<input
type="text"
id="email"
placeholder="Email Address">

<small class="error"
id="emailError"></small>

</div>

<div class="form-group">

<select id="country">

<option value="">
Select Country
</option>

<option value="India">
India
</option>

<option value="USA">
USA
</option>

<option value="UK">
UK
</option>

<option value="Japan">
Japan
</option>

<option value="UAE">
UAE
</option>

</select>

<small class="error"
id="countryError"></small>

</div>

<div class="form-group">

<input
type="text"
id="currency"
placeholder="Currency"
readonly>

</div>

<button type="submit">
Register
</button>

</form>

<p id="successMessage"></p>

</div>

<script src="script.js"></script>

</body>

</html>
