<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Management System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="top-bar">
            <a href="../../index.html" class="back-btn">
                ← Dashboard
            </a>

            <span>Internship Project #3</span>
        </div>

        <h1>Budget Management System</h1>

        <form id="budgetForm">

            <input
                type="text"
                id="subject"
                placeholder="Enter Subject"
                required>

            <select id="budgetType" required>
                <option value="">
                    Select Budget
                </option>

                <option value="10000">
                    Education (₹10,000)
                </option>

                <option value="15000">
                    Marketing (₹15,000)
                </option>

                <option value="20000">
                    Development (₹20,000)
                </option>

                <option value="25000">
                    Operations (₹25,000)
                </option>
            </select>

            <input
                type="number"
                id="budgetAmount"
                placeholder="Budget Amount"
                readonly>

            <input
                type="number"
                id="amountSpent"
                placeholder="Amount Spent"
                required>

            <input
                type="text"
                id="remainingBalance"
                placeholder="Remaining Balance"
                readonly>

            <button type="submit">
                Save Budget
            </button>

        </form>

        <table>

            <thead>

                <tr>
                    <th>Subject</th>
                    <th>Budget</th>
                    <th>Spent</th>
                    <th>Balance</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody id="budgetTableBody">

            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>

</html>
